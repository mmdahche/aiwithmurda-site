services:
  - type: web
    name: aiwithmurda-web
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    domains:
      - aiwithmurda.com
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SITE_URL
        value: https://aiwithmurda.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_FUTURE_METHOD_PRICE_ID
        sync: false
      - key: STRIPE_LIVE_BUILDS_PRICE_ID
        sync: false
      - key: STRIPE_OPERATOR_TOOLKIT_PRICE_ID
        sync: false
      - key: STRIPE_OPERATOR_UPDATES_PRICE_ID
        sync: false
      - key: STRIPE_PORTAL_CONFIGURATION_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: AI with Murda <murad@aiwithmurda.com>
      - key: RESEND_SEGMENT_ID
        sync: false
      - key: RESEND_AUDIENCE_ID
        sync: false
      - key: SOCIAL_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: SOCIAL_OAUTH_STATE_SECRET
        sync: false
      - key: FOLLOWER_TICKER_REFRESH_MS
        value: 15000
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: TWITCH_EVENTSUB_SECRET
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_GRAPH_VERSION
        value: v25.0
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_USERNAME
        sync: false
